name: Deploy site to GitHub Pages

# Publishes the static site to GitHub Pages. The first run will attempt to
# enable Pages automatically (enablement: true), so no manual settings change
# should be required.

on:
  push:
    branches:
      - main
      - claude/woodland-academy-ai-site-cti9w2
  workflow_dispatch:

# Permissions needed for the GITHUB_TOKEN to deploy to Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress run.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Publish the whole repository root — the site is plain static files.
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
